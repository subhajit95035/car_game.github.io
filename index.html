<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racing Game</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#2e7d32;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Login Screen */
#loginScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#1b5e20;
    display:flex;
    justify-content:center;
    align-items:center;
}

.loginBox{
    background:white;
    padding:25px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

.loginBox input{
    width:90%;
    padding:10px;
    margin:10px 0;
}

.loginBox button{
    padding:10px 20px;
    background:#4caf50;
    color:white;
    border:none;
    cursor:pointer;
}

#loginError{
    color:red;
    font-weight:bold;
}

/* Game Area */
#gameArea{
    width:400px;
    height:600px;
    background:#555;
    border-left:15px solid #8B4513;
    border-right:15px solid #8B4513;
    position:relative;
    overflow:hidden;
    display:none;
}

#line{
    width:8px;
    height:100%;
    position:absolute;
    left:196px;
    background:repeating-linear-gradient(
        transparent,
        transparent 20px,
        white 20px,
        white 40px
    );
    animation:roadMove .3s linear infinite;
}

@keyframes roadMove{
    from{
        background-position-y:0;
    }
    to{
        background-position-y:40px;
    }
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:22px;
    font-weight:bold;
    z-index:100;
}

/* Realistic Car */
.car{
    width:60px;
    height:110px;
    position:absolute;
    border-radius:12px;
    overflow:visible;
    box-sizing:border-box;
}

/* Player Car */
#playerCar{
    background-image:
    linear-gradient(
        to bottom,
        transparent 0%,
        transparent 15%,
        white 15%,
        white 85%,
        transparent 85%
    ),
    linear-gradient(
        to bottom,
        #00ff66,
        #009944
    );

    border:2px solid #111;
    bottom:20px;
    left:170px;
}

/* Enemy Car */
.enemy{
    background-image:
    linear-gradient(
        to bottom,
        transparent 0%,
        transparent 15%,
        white 15%,
        white 85%,
        transparent 85%
    ),
    linear-gradient(
        to bottom,
        #ff4444,
        #990000
    );

    border:2px solid #111;
    top:-120px;
}

/* Front Glass */
.car::before{
    content:"";
    position:absolute;
    width:38px;
    height:24px;
    left:9px;
    top:10px;
    background:#9ad8ff;
    border:1px solid #333;
    border-radius:6px;
}

/* Rear Glass */
.car::after{
    content:"";
    position:absolute;
    width:38px;
    height:18px;
    left:9px;
    bottom:10px;
    background:#9ad8ff;
    border:1px solid #333;
    border-radius:6px;
}

/* Wheels */
.car{
    box-shadow:
        -8px 15px 0 0 black,
        58px 15px 0 0 black,
        -8px 75px 0 0 black,
        58px 75px 0 0 black;
}
</style>
</head>

<body>

<div id="loginScreen">
    <div class="loginBox">
        <h2>Login To Play</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <p id="loginError"></p>

        <p>
            Demo Login:<br>
            Username: <b>player</b><br>
            Password: <b>1234</b>
        </p>
    </div>
</div>

<div id="gameArea">
    <div id="score">Score: 0</div>
    <div id="line"></div>
    <div id="playerCar" class="car"></div>
</div>

<script>
const gameArea = document.getElementById("gameArea");
const playerCar = document.getElementById("playerCar");

let carLeft = 170;
let score = 0;
let gameStarted = false;

function login(){

    let username =
    document.getElementById("username").value;

    let password =
    document.getElementById("password").value;

    if(username === "player" &&
       password === "1234"){

        document.getElementById("loginScreen")
        .style.display = "none";

        gameArea.style.display = "block";

        startGame();
    }
    else{
        document.getElementById("loginError")
        .innerText =
        "Invalid Username or Password";
    }
}

function startGame(){

    if(gameStarted) return;

    gameStarted = true;

    setInterval(spawnEnemy,1500);

    setInterval(()=>{
        score++;
        document.getElementById("score")
        .innerText = "Score: " + score;
    },1000);
}

document.addEventListener("keydown",(e)=>{

    if(!gameStarted) return;

    if(e.key==="ArrowLeft" && carLeft>45){
        carLeft -= 60;
    }

    if(e.key==="ArrowRight" && carLeft<295){
        carLeft += 60;
    }

    playerCar.style.left = carLeft + "px";
});

function spawnEnemy(){

    const enemy = document.createElement("div");

    enemy.classList.add("car","enemy");

    let positions = [45,115,225,295];

    enemy.style.left =
    positions[Math.floor(
        Math.random()*positions.length
    )] + "px";

    gameArea.appendChild(enemy);

    let topPos = -120;

    let move = setInterval(()=>{

        topPos += 10;

        enemy.style.top = topPos + "px";

        if(topPos > 650){
            enemy.remove();
            clearInterval(move);
        }

        if(
            topPos > 450 &&
            topPos < 580 &&
            Math.abs(
                parseInt(enemy.style.left)
                - carLeft
            ) < 55
        ){
            alert(
                "Game Over!\nScore: " + score
            );

            location.reload();
        }

    },30);
}
</script>

</body>
</html>
